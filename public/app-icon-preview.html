<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App 图标预览</title>
    <style>
      @font-face {
        font-family: Inter;
        src: url("/fonts/inter-v20.woff2") format("woff2");
        font-weight: 400 700;
        font-style: normal;
        font-display: swap;
      }

      :root {
        color-scheme: light;
        --bg: #EAE7E2;
        --phone: #F9F8F6;
        --text: #4A4540;
        --muted: #8E9790;
        --sage: #8FA88B;
        --border: #F2EDE9;
        --terracotta: #D48166;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 18% 12%, rgba(212, 129, 102, 0.12), transparent 28rem),
          radial-gradient(circle at 84% 16%, rgba(143, 168, 139, 0.18), transparent 24rem),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 32px 18px;
      }

      main {
        width: min(960px, 100%);
        display: grid;
        grid-template-columns: minmax(280px, 0.9fr) minmax(300px, 1.1fr);
        gap: 28px;
        align-items: stretch;
      }

      .hero,
      .panel {
        background: rgba(249, 248, 246, 0.84);
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 32px;
        box-shadow: 0 24px 60px rgba(74, 69, 64, 0.12);
      }

      .hero {
        padding: 34px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 28px;
      }

      .icon-stage {
        aspect-ratio: 1;
        width: min(320px, 100%);
        margin: 0 auto;
        border-radius: 38px;
        display: grid;
        place-items: center;
        background: linear-gradient(150deg, #FFFFFF 0%, #F2EDE9 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 20px 44px rgba(74,69,64,0.16);
      }

      .icon-stage img {
        width: 86%;
        height: 86%;
        display: block;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 5vw, 54px);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .summary {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.8;
      }

      .panel {
        padding: 28px;
      }

      .section-title {
        margin: 0 0 16px;
        font-size: 13px;
        color: var(--sage);
        font-weight: 800;
      }

      .sizes {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
        align-items: end;
      }

      .size-card {
        display: grid;
        gap: 10px;
        justify-items: center;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .size-card img {
        display: block;
        border-radius: 24%;
        box-shadow: 0 12px 28px rgba(74, 69, 64, 0.14);
      }

      .mock-grid {
        margin-top: 28px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .mock {
        min-height: 150px;
        border-radius: 26px;
        background: #FFFDF9;
        border: 1px solid var(--border);
        padding: 18px;
      }

      .mock.dark {
        background: #4A4540;
        color: #F9F8F6;
      }

      .app-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 16px;
      }

      .app-row img {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        box-shadow: 0 8px 16px rgba(74, 69, 64, 0.18);
      }

      .name {
        font-size: 13px;
        font-weight: 800;
      }

      .caption {
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
      }

      .dark .caption {
        color: rgba(249, 248, 246, 0.62);
      }

      .tokens {
        margin-top: 26px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .token {
        border-radius: 999px;
        padding: 7px 10px;
        background: #fff;
        border: 1px solid var(--border);
        font-size: 11px;
        color: var(--muted);
        font-weight: 700;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }

        .sizes {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="icon-stage">
          <img src="/app-icon-concept.svg" alt="简约卡通树图标概念" />
        </div>
        <div>
          <h1>简约树<br />图标</h1>
          <p class="summary">
            只保留主题色底和中间一棵简约卡通树。树代表记录后的生长，暖白树冠让图标在小尺寸下保持清楚。
          </p>
        </div>
      </section>

      <section class="panel">
        <p class="section-title">多尺寸识别测试</p>
        <div class="sizes">
          <div class="size-card">
            <img src="/app-icon-concept.svg" alt="" style="width: 32px; height: 32px" />
            <span>32px</span>
          </div>
          <div class="size-card">
            <img src="/app-icon-concept.svg" alt="" style="width: 64px; height: 64px" />
            <span>64px</span>
          </div>
          <div class="size-card">
            <img src="/app-icon-concept.svg" alt="" style="width: 128px; height: 128px" />
            <span>128px</span>
          </div>
          <div class="size-card">
            <img src="/app-icon-concept.svg" alt="" style="width: 192px; height: 192px" />
            <span>192px</span>
          </div>
        </div>

        <div class="mock-grid">
          <div class="mock">
            <p class="section-title">浅色主屏幕</p>
            <div class="app-row">
              <img src="/app-icon-concept.svg" alt="" />
              <div>
                <div class="name">Mood Tracker</div>
                <div class="caption">心情、睡眠与日常记录</div>
              </div>
            </div>
          </div>
          <div class="mock dark">
            <p class="section-title">深色背景</p>
            <div class="app-row">
              <img src="/app-icon-concept.svg" alt="" />
              <div>
                <div class="name">Mood Tracker</div>
                <div class="caption">图标边界仍然清楚</div>
              </div>
            </div>
          </div>
        </div>

        <div class="tokens">
          <span class="token">#8FA88B 主题底色</span>
          <span class="token">暖白树冠</span>
          <span class="token">卡通树形</span>
          <span class="token">小尺寸优先</span>
        </div>
      </section>
    </main>
  </body>
</html>
