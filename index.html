<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mood-tracker</title>
    <style>
      #preboot-cloud-loading[hidden] { display: none; }
      #preboot-cloud-loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: 32px;
        background: rgba(249, 248, 246, 0.98);
        color: #4a4540;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        text-align: center;
      }
      .preboot-cloud-loading__spinner {
        width: 48px;
        height: 48px;
        margin: 0 auto;
        border: 4px solid #e6f0e6;
        border-top-color: #8fa88b;
        border-radius: 50%;
        animation: preboot-spin 0.85s linear infinite;
      }
      .preboot-cloud-loading__title {
        margin: 18px 0 0;
        font-size: 18px;
        font-weight: 700;
      }
      .preboot-cloud-loading__description {
        margin: 8px 0 0;
        color: #9ca3af;
        font-size: 12px;
        line-height: 1.6;
      }
      @keyframes preboot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="preboot-cloud-loading" role="status" aria-live="polite" aria-busy="true" hidden>
        <div>
          <div class="preboot-cloud-loading__spinner" aria-hidden="true"></div>
          <p class="preboot-cloud-loading__title">正在拉取云端数据</p>
          <p class="preboot-cloud-loading__description">首次同步可能需要一点时间，请耐心等待。</p>
        </div>
      </div>
    </div>
    <script>
      try {
        if (localStorage.getItem('mood_tracker_cloud_token')) {
          document.getElementById('preboot-cloud-loading').hidden = false;
        }
      } catch {
        // Continue in local mode when storage is unavailable.
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
